# To update pinned container digests and pyenv version (not handled by Dependabot):
# Containers: change tag and get new digest with
#   docker pull <image>:<tag> && docker inspect --format='{{index .RepoDigests 0}}' <image>:<tag>
# pyenv: see https://github.com/pyenv/pyenv/releases
name: Test with compiler sanitizers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - maintenance/**
    paths-ignore:
      - '**.pyi'
      - '**.md'
      - '**.rst'
      - 'tools/stubtest/**'

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  clang_ASAN_UBSAN:
    # To enable this workflow on a fork, comment out:
    if: github.repository == 'numpy/numpy'
    runs-on: macos-26
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: recursive
        fetch-tags: true
        persist-credentials: false
    - name: Set up pyenv
      run: |
        git clone --branch v2.7.3 --depth 1 https://github.com/pyenv/pyenv.git "$HOME/.pyenv"
        PYENV_ROOT="$HOME/.pyenv"
        PYENV_BIN="$PYENV_ROOT/bin"
        PYENV_SHIMS="$PYENV_ROOT/shims"
        echo "$PYENV_BIN" >> $GITHUB_PATH
        echo "$PYENV_SHIMS" >> $GITHUB_PATH
        echo "PYENV_ROOT=$PYENV_ROOT" >> $GITHUB_ENV
    - name: Check pyenv is working
      run:
        pyenv --version
    - name: Set up LLVM
      run: |
        brew install llvm
        LLVM_PREFIX=$(brew --prefix llvm)
        echo CC="$LLVM_PREFIX/bin/clang" >> $GITHUB_ENV
        echo CXX="$LLVM_PREFIX/bin/clang++" >> $GITHUB_ENV
        echo LDFLAGS="-L$LLVM_PREFIX/lib" >> $GITHUB_ENV
        echo CPPFLAGS="-I$LLVM_PREFIX/include" >> $GITHUB_ENV
    - name: Build Python with address sanitizer
      run: |
        CONFIGURE_OPTS="--with-address-sanitizer" pyenv install -v 3.14
        pyenv global 3.14
    - name: Install dependencies
      run: |
        pip install -r requirements/build_requirements.txt
        pip install -r requirements/ci_requirements.txt
        pip install -r requirements/test_requirements.txt
        # xdist captures stdout/stderr, but we want the ASAN output
        pip uninstall -y pytest-xdist
    - name: Build
      run:
        python -m spin build -j2 -- -Db_sanitize=address,undefined -Db_lundef=false
    - name: Test
      run: |
        # pass -s to pytest to see ASAN errors and warnings, otherwise pytest captures them
        # Ignore test_casting_floatingpoint_errors on macOS for now - causes crash inside UBSAN
        ASAN_OPTIONS=detect_leaks=0:symbolize=1:strict_init_order=true:allocator_may_return_null=1 \
        UBSAN_OPTIONS=halt_on_error=1:suppressions=${GITHUB_WORKSPACE}/tools/ci/ubsan_suppressions_arm64.txt \
        python -m spin test -- -k "not test_casting_floatingpoint_errors" -v -s --timeout=600 --durations=10

  clang_TSAN:
    # To enable this workflow on a fork, comment out:
    if: github.repository == 'numpy/numpy'
    runs-on: ubuntu-latest
    container:
        image: ghcr.io/nascheme/numpy-tsan:3.14t@sha256:1ec427e2e480cc373d0fecbf21b8ac590fb94119fb81d18489945cd0afd04dd3
        options: --shm-size=2g # increase memory for large matrix ops

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trust working directory and initialize submodules
        run: |
          git config --global --add safe.directory /__w/numpy/numpy
          git submodule update --init --recursive
      - name: Get OpenBLAS version ci_requirements.txt
        run: |
          version=$(sed -nE 's/^scipy-openblas64==([0-9]+\.[0-9]+\.[0-9]+)\..*$/\1/p' requirements/ci_requirements.txt)
          if [ -z "$version" ]; then
            echo "Could not parse the scipy-openblas64 pin from requirements/ci_requirements.txt"
            exit 1
          fi
          echo "OPENBLAS_VERSION=v$version"
          echo "OPENBLAS_VERSION=v$version" >> "$GITHUB_ENV"
      - name: Uninstall pytest-xdist (conflicts with TSAN)
        run: pip uninstall -y pytest-xdist

      - name: Uninstall scipy-openblas
        run: pip uninstall -y scipy-openblas32 scipy-openblas64

      - name: Upgrade spin (gh-29777)
        run: pip install -U spin

      - name: Install OpenBLAS build tools
        run: pip install cmake

      - name: Set up ccache
        run: |
          apt-get update && apt-get install -y ccache
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=500M" >> "$GITHUB_ENV"

      - name: Cache compiler output (ccache)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: tsan-ccache-${{ github.sha }}
          restore-keys: tsan-ccache-

      - name: Cache TSAN-instrumented OpenBLAS
        id: cache-openblas
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: openblas-tsan
          key: tsan-openblas-${{ env.OPENBLAS_VERSION }}-core2

      - name: Build OpenBLAS with ThreadSanitizer
        if: steps.cache-openblas.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch $OPENBLAS_VERSION \
            https://github.com/OpenMathLib/OpenBLAS.git openblas-src
          # Follows OpenBLAS's own TSAN CI (linux_thread_sanitizer), see
          # https://github.com/OpenMathLib/OpenBLAS/blob/develop/.github/workflows/dynamic_arch.yml
          cmake -S openblas-src -B openblas-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=${CC:-clang} \
            -DCMAKE_CXX_COMPILER=${CXX:-clang++} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_FLAGS="-fsanitize=thread -g -O1 -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1 -fno-omit-frame-pointer" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_STATIC_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DDYNAMIC_ARCH=OFF \
            -DNOFORTRAN=ON \
            -DC_LAPACK=ON \
            -DUSE_THREAD=ON \
            -DUSE_OPENMP=OFF \
            -DNUM_THREADS=64 \
            -DNUM_PARALLEL=2 \
            -DTARGET=CORE2 \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/openblas-tsan
          cmake --build openblas-src/build -j4
          cmake --install openblas-src/build

      - name: Build NumPy with ThreadSanitizer
        run: |
          export PKG_CONFIG_PATH=$GITHUB_WORKSPACE/openblas-tsan/lib/pkgconfig
          export CC="ccache $CC" CXX="ccache $CXX"
          export LDFLAGS="-fsanitize=thread"
          python -m spin build -j2 -- -Db_sanitize=thread \
            -Dblas=openblas -Dlapack=openblas -Dallow-noblas=false
          ccache -s

      - name: Run tests under prebuilt TSAN container
        run: |
          export TSAN_OPTIONS="halt_on_error=0:allocator_may_return_null=1:suppressions=$GITHUB_WORKSPACE/tools/ci/tsan_suppressions.txt"
          echo "TSAN_OPTIONS=$TSAN_OPTIONS"
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/openblas-tsan/lib
          python -m spin run python -P -c "import numpy; numpy.show_config()"
          python -m spin test \
          `find numpy -name "test*.py" | xargs grep -E -l "import threading|ThreadPoolExecutor" | tr '\n' ' '` \
           -- -v -s --timeout=600 --durations=10

  clang_ASAN:
    # To enable this workflow on a fork, comment out:
    if: github.repository == 'numpy/numpy'
    runs-on: ubuntu-latest
    container:
        image: ghcr.io/nascheme/cpython-asan:3.14@sha256:b5bfbcdca07e86d22afaf66e3b57959e1c44756452dcabda1efde7711fd0bdde
        options: --shm-size=2g # increase memory for large matrix ops

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trust working directory and initialize submodules
        run: |
          git config --global --add safe.directory /__w/numpy/numpy
          git submodule update --init --recursive

      - name: Install dependencies
        run: |
          pip install -r requirements/build_requirements.txt
          pip install -r requirements/ci_requirements.txt
          pip install -r requirements/test_requirements.txt
          # xdist captures stdout/stderr, but we want the ASAN output
          pip uninstall -y pytest-xdist

      - name: Build NumPy with AddressSanitizer & LeakSanitizer
        run: python -m spin build -j4 -- -Db_sanitize=address,leak

      - name: Test
        run: |
          # pass -s to pytest to see ASAN errors and warnings, otherwise pytest captures them
          export ASAN_OPTIONS="detect_leaks=1:symbolize=1:strict_init_order=true:allocator_may_return_null=1:use_sigaltstack=0"
          export LSAN_OPTIONS="suppressions=$GITHUB_WORKSPACE/tools/ci/lsan_suppressions.txt"
          python -m spin test -- -v -s --timeout=600 --durations=10
